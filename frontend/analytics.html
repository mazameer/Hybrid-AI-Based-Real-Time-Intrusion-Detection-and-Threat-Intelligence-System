<!DOCTYPE html>
<html>

<head>
<title>Traffic Analytics</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
margin:0;
height:100vh;
display:flex;
flex-direction:column;
overflow:hidden;
}

.header{
background:#020617;
padding:15px;
text-align:center;
font-size:22px;
position:relative;
}

.back-btn{
position:absolute;
left:15px;
top:12px;
background:#22c55e;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
color:black;
font-weight:bold;
}

.container{
flex:1;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
width:90%;
height:90%;
display:flex;
align-items:center;
justify-content:center;
}

canvas{
width:100% !important;
height:100% !important;
}

</style>

</head>

<body>

<div class="header">
<button class="back-btn" onclick="goBack()">← Back</button>
Traffic Analytics
</div>

<div class="container">

<div class="card">
<canvas id="attackChart"></canvas>
</div>

</div>

<script>

function goBack(){
window.location.href="dashboard.html"
}

const chart=new Chart(
document.getElementById("attackChart"),
{
type:"bar",
data:{
labels:["DoS","Scan","Suspicious"],
datasets:[{
data:[0,0,0],
backgroundColor:["#ef4444","#f59e0b","#3b82f6"]
}]
},
options:{
responsive:true,
maintainAspectRatio:false
}
})

async function update(){

const res=await fetch("http://localhost:5000/alerts")
const data=await res.json()

let dos=0
let scan=0
let suspicious=0

data.forEach(a=>{
if(a.type=="DoS") dos++
if(a.type=="Scan") scan++
if(a.type=="Suspicious") suspicious++
})

chart.data.datasets[0].data=[dos,scan,suspicious]
chart.update()

}

setInterval(update,3000)

</script>

</body>
</html>
